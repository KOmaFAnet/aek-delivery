<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AEK Delivery</title>

    <meta name="description" content="AEK, AEK Delivery, Delivery services, Catering delivery, Fast-Food delivery, Sushi delivery, B2B">
    <meta name="keywords" content="AEK, AEK Delivery, Delivery services, Catering delivery, Fast-Food delivery, Sushi delivery, B2B Services, ">
    <link rel="icon" type="image/png" sizes="32x32" href="images/genfavicon-32.png">
    <link rel="shortcut icon" href="images/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon-180x180.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="main.css">
    
</head>
<body>
    <div class="wrap">
        <header>
            <div class="header-left">
                <a href="index.html">
                <img src="logo.avif" alt="logo image">
                </a>
                <h1 class="main-name">AEK Delivery</h1>
            </div>
            <nav id="navigation-desktop">
                    <div class="category-menu-open">
                        <a href="#" id="category-button">
                            <img src="menu.svg" alt="Open menu">Select a category
                        </a>
                        <ul class="category">
                            <li>
                                <a href="fast-food.html">
                                    <img src="burger-icon.png" alt="Burger image">Fast Food
                                </a>
                            </li>
                            <li>
                                <a href="confectionery.html">
                                    <img src="sweets-icon.png" alt="Sweets image">Confectionery
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <img src="catering-icon.png" alt="Catering image">Catering & banquets
                                </a>
                            </li> 
                            <li>
                                <a href="sushi.html">
                                    <img src="sushi-icon.png" alt="Sushi image">Sushi
                                </a>
                            </li>
                        </ul>
                    </div>
                    <div class="leave-a-request-desktop"><a href="leave-a-request.html">Leave a request</a></div> 
                    <div class="about-us-desktop"><a href="about-us.html">About Us</a></div>
            </nav>
            <a href="javascript:void(0);" id="mobile-menu" onclick="myFunction()">
                <img src="menu.svg" alt="Menu Icon">
            </a>
        </header>
        
        <main>
            <div class="text">
                <h1>Connect our delivery service to your restaurant</h1>

                <p>Your clients will receive food and you will receive money</p>

                <a href="leave-a-request.html" class="action-button">Leave a request</a>
            </div>
                <div class="food-container">
                    <img src="food.webp" alt="Fast food illustration">
                </div>     
        </main>
    </div>
    <script>

        const button = document.getElementById("category-button");
        const menu = document.querySelector(".category");

        button.addEventListener("click", function(event) {
            event.preventDefault();
            menu.classList.toggle("open");
        });
        
        function myFunction() {
            var x = document.getElementById("navigation-desktop");
                if (x.style.width === "50vw") {
                x.style.width = "0";
                } else {
                x.style.width = "50vw";
                }
        }
        
    </script>
</body>
</html>
